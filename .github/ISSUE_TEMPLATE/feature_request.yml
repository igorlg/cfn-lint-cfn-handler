name: Feature request
description: Propose a new rule or capability for cfn-lint-cfn-handler
title: 'Feature request: '
labels: [feature-request, triage]
body:
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What problem are you trying to solve? Who benefits?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the API or behaviour look like?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you ruled out, and why.
  - type: textarea
    id: extra
    attributes:
      label: Anything else?

AWSTemplateFormatVersion: '2010-09-09'
Description: E9101 fixture — Lambda Timeout is an unresolvable intrinsic (skip silently)

Parameters:
  TimeoutSeconds:
    Type: Number
    Default: 5
    Description: Lambda timeout (parameter — value cannot be statically resolved)

Resources:
  HandlerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BasicExec
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  MyHandler:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: e9101-handler-param-timeout
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt HandlerRole.Arn
      Timeout: !Ref TimeoutSeconds
      Code:
        ZipFile: |
          def handler(event, context):
              return {"Status": "SUCCESS"}

  MyCustomResource:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt MyHandler.Arn
      ServiceTimeout: 600
